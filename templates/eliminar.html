<table class="w-full text-sm text-left text-gray-500">
    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
        <tr>
            <th scope="col" class="px-6 py-3">Nombre</th>
            <th scope="col" class="px-6 py-3">Apellido</th>
            <th scope="col" class="px-6 py-3">Correo</th>
            <th scope="col" class="px-6 py-3 text-center">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for alum in alumnos %}
        <tr class="bg-white border-b hover:bg-gray-50">
            <td class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">{{alum.nombre}}</td>
            <td class="px-6 py-4">{{alum.apellidos}}</td>
            <td class="px-6 py-4">{{alum.correo}}</td>
            <td class="px-6 py-4 flex justify-center gap-2">
                <a href="detalles?id={{ alum.id }}" class="rounded-md border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-100 transition-colors">
                    Detalles
                </a>
                <a href="modificar?id={{ alum.id }}" class="rounded-md bg-blue-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-blue-700 transition-colors">
                    Editar
                </a>
                <a href="eliminar?id={{ alum.id }}" onclick="return confirm('¿Estás seguro de que deseas eliminar a este alumno?');" class="rounded-md bg-red-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-700 transition-colors">
                    Eliminar
                </a>
            </td>
        </tr>
        {% else %}
        <tr class="bg-white border-b">
            <td colspan="4" class="px-6 py-4 text-center text-gray-500">No hay registros de alumnos.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
