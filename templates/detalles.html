{% extends "layout.html" %} 
{% block container %}
<div class="group py-32 relative overflow-x-auto sm:rounded-lg flex justify-center">
  <div class="relative bg-white dark:bg-gray-800 max-w-xs w-full p-6 border border-gray-200 dark:border-gray-700 rounded-xl shadow-lg">
    
    <div class="flex flex-col items-center">
      <img
        class="w-24 h-24 mb-6 rounded-full shadow-md"
        src="{{url_for('static',filename='img/usuario.png')}}"
        alt="Foto de perfil"
      />
      <h5 class="mb-1 text-xl font-bold tracking-tight text-gray-900 dark:text-white text-center">
        {{nombre}} {{apellidos}}
      </h5>
      <h3 class="mb-4 text-sm font-medium tracking-tight text-gray-500 dark:text-gray-400">
        {{email}}
      </h3>
      
      <div class="flex mt-4 md:mt-6 gap-4">
        <a
          href="/"
          class="inline-flex items-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-colors shadow-sm"
        >
          <svg class="w-4 h-4 me-1.5 -ms-0.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
          Regresar
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
